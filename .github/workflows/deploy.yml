name: Deploy to GitHub Pages

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

# 保持在頂層是正確的，但確認沒有縮排錯誤
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true" # 建議加上引號確保作為字串讀取

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24 # 升級到 24，對應 GitHub 的要求
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build static site
        run: npm run build

      - name: Verify CNAME exists
        # 簡化邏輯，確保 CNAME 一定在 dist 裡
        run: |
          if [ -f public/CNAME ] && [ ! -f dist/CNAME ]; then
            cp public/CNAME dist/CNAME
          fi
          [ -f dist/CNAME ] && echo "CNAME checked: $(cat dist/CNAME)" || echo "Warning: No CNAME found"

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4